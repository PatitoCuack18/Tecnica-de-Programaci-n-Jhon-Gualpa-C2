<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Producción</title>
</head>
<body>

    <h2 align="center">Sistema para Control de Producción</h2>

    <table border="1" align="center">
        <thead>
            <tr>
                <th colspan="2">Control de Producción</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Dimensión Días</td>
                <td>
                    <select id="id-select-dias">
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7" selected>7</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td colspan="2" align="center">
                    <button id="id-btn-cargar-produccion">Cargar Producción</button>
                </td>
            </tr>
            <tr>
                <td>
                    <button id="id-btn-presentar-produccion">Presentar</button>
                </td>
                <td>
                    <textarea id="id-listado-produccion" rows="6" cols="30" readonly></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <button id="id-btn-procesar">Procesar</button>
                </td>
                <td>
                    <textarea id="id-resultados" rows="10" cols="30" readonly></textarea>
                </td>
            </tr>

        </tbody>

    </table>

    <script src="./app.js"></script>

</body>
</html>
